version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fxdashboard-backend
    ports:
      - "4000:4000"
    volumes:
      - ./data:/app/data
    environment:
      - PORT=4000
      - DB_DIR=/app/data
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fxdashboard-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: always

volumes:
  data:
